  <h1>📞Get in Touch📞</h1>
    <main>
        <section class="contact-wrapper">
            <!-- Form -->
            <form class="contact-form" id="contactForm" novalidate>
                <h3>📱Contact Us📱</h3>
                
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your full name" required aria-label="Name">
                
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required aria-label="Email">
                
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" placeholder="Subject" required aria-label="Subject">
                
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Your message..." required aria-label="Message"></textarea>
                
                <button type="submit">Send Message</button>
                <p id="form-feedback" aria-live="polite"></p>
            </form>

            <!-- Map iframe -->
            <div class="map-container">
                <h3>📍Find Us📍</h3>
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3308.4181581130983!2d25.593772075524473!3d-33.98179157318357!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6bd5a3221e6b1d75%3A0x19d48ed3ea6c4d6b!2sBSP%20Construction!5e0!3m2!1sen!2sza!4v1781882394926!5m2!1sen!2sza" 
                width="600" 
                height="450" 
                style="border:0;" 
                loading="lazy"
                title="Uhambo Olumyoli Location Map">
                </iframe>
            </div>
        </section>
